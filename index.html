// ─── Utility functions ───────────────────────────────────────────────────────
function zAlpha(alpha) { return Z[alpha] || 1.96; }
function zBeta(power) { return Z_BETA[power] || 1.2816; }

function designEffect(m, icc, cv = 0) {
  if (cv > 0) return 1 + ((cv * cv + 1) * m - 1) * icc;
  return 1 + (m - 1) * icc;
}

function sampleSizePerArm(p_control, p_intervention, alpha, power, m, icc, cv, attrition, stratR2 = 0) {
  const za = zAlpha(alpha);
  const zb = zBeta(power);
  const p1 = p_control;
  const p2 = p_intervention;
  const n_ind = Math.pow(za + zb, 2) * (p1 * (1 - p1) + p2 * (1 - p2)) / Math.pow(p2 - p1, 2);
  const icc_eff = icc * (1 - stratR2);
  const de = designEffect(m, icc_eff, cv);
  const n_cluster = Math.ceil(n_ind * de);
  const n_with_attrition = Math.ceil(n_cluster / (1 - attrition));
  const clusters = Math.ceil(n_with_attrition / m);
  return { n_ind: Math.ceil(n_ind), de, icc_eff, n_cluster, n_with_attrition, clusters, total_per_arm: clusters * m };
}

function computePooledICC(siteICCs, siteWeights) {
  let num = 0, den = 0;
  siteICCs.forEach((v, i) => {
    if (v !== null && v !== "" && !isNaN(v)) {
      const w = siteWeights[i] || 1;
      num += parseFloat(v) * w;
      den += w;
    }
  });
  return den > 0 ? num / den : null;
}

function ResultCard({ label, outcome, result, isBinding, protocol, poweringLevel }) {

  const isSiteLevel = poweringLevel === "site";

  const totalClusters = isSiteLevel ? result.clusters * 2 * NUM_SITES : result.clusters * 2;
  const totalParticipants = isSiteLevel ? result.total_per_arm * 2 * NUM_SITES : result.total_per_arm * 2;
  const v3Total = protocol.clusters_per_arm_per_site * 2 * NUM_SITES;
  return (
    <div style={{ ...styles.resultBox, background: bg, border: `1px solid ${color}30` }}>
      <div style={{ fontSize: "13px", fontWeight: "700", color, marginBottom: "8px" }}>
        {label} {isBinding && <span style={styles.bindingTag}>BINDING OUTCOME</span>}
        <span style={{ ...styles.badge, background: isSiteLevel ? PURPLE : ACCENT, color: "white" }}>
          {isSiteLevel ? "Powered per site" : "Study-level power"}

      </div>
      <div style={styles.compRow}>

  return `<!DOCTYPE html>

  <tr><td>Attrition</td><td colspan="2">${(attrition * 100).toFixed(0)}%</td></tr>
  <tr><td>CV of cluster size</td><td colspan="2">${cv.toFixed(2)} ${cv > 0 ? "(Eldridge adjustment applied)" : ""}</td></tr>
  <tr><td>Stratified randomization</td><td colspan="2">${stratified ? `Yes (R\u00B2=${stratR2.toFixed(2)})` : "No"}</td></tr>
  <tr><td>Powering level</td><td colspan="2">${isSite ? "Each site independently" : "Whole study (pooled)"}</td></tr>
</table>

<h2>Results</h2>
<div class="highlight">
  <table>
    <tr><th>Outcome</th><th>Design Effect</th><th>Clusters/Arm/Site</th><th>Total Clusters</th><th>Total Participants</th><th></th></tr>
    <tr>
      <td><strong>BP Control</strong></td><td>${htnResult.de.toFixed(2)}</td>
      <td>${htnCPAS}</td><td>${htnTotal}</td><td>${htnPart.toLocaleString()}</td>
      <td>${htnBinding ? '<span class="binding">BINDING</span>' : ""}</td>
    </tr>
    <tr>
      <td><strong>Glycemic Control</strong></td><td>${dmResult.de.toFixed(2)}</td>
      <td>${dmCPAS}</td><td>${dmTotal}</td><td>${dmPart.toLocaleString()}</td>
      <td>${!htnBinding ? '<span class="binding">BINDING</span>' : ""}</td>
    </tr>
  </table>
  <p style="margin-top:12px; font-weight:600;">
    Required: <strong>${Math.max(htnCPAS, dmCPAS)} clusters per arm per site</strong> =
    <strong>${bindingTotal} total clusters</strong> across ${NUM_SITES} sites
  </p>
</div>

<h2>Comparison with Protocol V3</h2>
<table>
  <tr><th>Parameter</th><th>Revised</th><th>Protocol V3</th><th>Change</th></tr>
  <tr><td>ICC (BP)</td><td>${effectiveICCHTN.toFixed(4)}</td><td>0.1000</td><td>${effectiveICCHTN < 0.10 ? "Lower (fewer clusters)" : "Higher"}</td></tr>
  <tr><td>ICC (Glycemic)</td><td>${effectiveICCDM.toFixed(4)}</td><td>0.0500</td><td>${effectiveICCDM < 0.05 ? "Lower" : "Higher (more clusters)"}</td></tr>
  <tr><td>Total clusters (binding)</td><td>${bindingTotal}</td><td>360</td><td>${bindingTotal < 360 ? "Reduced by " + (360 - bindingTotal) : "Increased by " + (bindingTotal - 360)}</td></tr>
  <tr><td>Baseline BP control</td><td>${(htn_p_control * 100).toFixed(1)}%</td><td>22.0%</td><td>From survey data</td></tr>
  <tr><td>Baseline glycemic control</td><td>${(dm_p_control * 100).toFixed(1)}%</td><td>30.0%</td><td>From survey data</td></tr>
</table>

<div class="footer">
  STEPS-INDIA CRCT Sample Size Calculator v2.2 | ICMR-NHRP Funded<br>
  Formulas: Donner & Klar (1981); Hayes & Bennett (1999); Eldridge et al. (2006); Rutterford, Copas & Eldridge (2015)<br>
  ICCs from baseline survey using GEE with exchangeable correlation (Zou & Donner 2004)
</div>
</body></html>`;
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  // Initialize ICCs from survey data, substituting pooled where ICC=0 or insufficient
  const pooledBP = SURVEY_DATA.overall.iccBP_gee;
  const pooledGlyc = SURVEY_DATA.overall.iccGlyc_gee;

  const initialICCHTN = SURVEY_DATA.sites.map(s =>
    s.insufficient ? pooledBP : (s.iccBP === 0.0 ? pooledBP : s.iccBP)
  );
  const initialICCDM = SURVEY_DATA.sites.map(s =>
    (s.insufficient || s.lowHba1c || s.iccGlyc === 0.0 || s.iccGlyc === null) ? pooledGlyc : s.iccGlyc
  );
  // Track which values are pooled substitutions
  const iccBPIsPooled = SURVEY_DATA.sites.map(s => s.insufficient || s.iccBP === 0.0 || s.iccBP === null);
  const iccGlycIsPooled = SURVEY_DATA.sites.map(s => s.insufficient || s.lowHba1c || s.iccGlyc === 0.0 || s.iccGlyc === null);

  // ICC inputs
  const [iccHTN, setIccHTN] = useState(initialICCHTN.map(v => v.toFixed(4)));
  const [iccDM, setIccDM] = useState(initialICCDM.map(v => v.toFixed(4)));
  const [siteWeights, setSiteWeights] = useState(SURVEY_DATA.sites.map(s => s.clusters));

  // Trial parameters — HTN (updated from survey: baseline 19.8%)
  // htn_effect is now RELATIVE (fraction of baseline). 0.53 = 53% relative improvement.
  // Protocol V3 anchor: 10.5pp absolute / 19.8% baseline ≈ 0.53 relative
  const [htn_p_control, setHtnPControl] = useState(0.198);
  const [htn_effect, setHtnEffect] = useState(0.53);
  const [htn_clusterSize, setHtnClusterSize] = useState(25);

  // Trial parameters — DM (survey: 35.5% among those with verified HbA1c)
  // dm_effect relative. Protocol V3: 8.4pp / 35.5% ≈ 0.24 relative
  const [dm_p_control, setDmPControl] = useState(0.355);
  const [dm_effect, setDmEffect] = useState(0.24);
  const [dm_clusterSize, setDmClusterSize] = useState(15);

  // Helper: convert relative effect to absolute p_intervention, clamped to <1
  const pInt = (p, rel) => Math.min(0.999, p * (1 + rel));
  const htn_p_int = pInt(htn_p_control, htn_effect);
  const dm_p_int  = pInt(dm_p_control, dm_effect);
  const htn_abs_pp = (htn_p_int - htn_p_control) * 100;
  const dm_abs_pp  = (dm_p_int  - dm_p_control ) * 100;

  // Shared parameters
  const [alpha, setAlpha] = useState(0.025);
  const [power, setPower] = useState(0.90);
  const [attrition, setAttrition] = useState(0.15);
  const [cv, setCv] = useState(0.20);
  const [stratified, setStratified] = useState(true);
  const [stratR2, setStratR2] = useState(0.10);
  const [poweringLevel, setPoweringLevel] = useState("study");

  // ICC source: "survey" (pooled from table), "manual" (user overrides)
  const [iccSource, setIccSource] = useState("survey");
  const [manualICCHTN, setManualICCHTN] = useState(pooledBP);
  const [manualICCDM, setManualICCDM] = useState(pooledGlyc);

  // Compute weighted pooled ICCs from table
  const pooledHTN = useMemo(() => computePooledICC(iccHTN, siteWeights), [iccHTN, siteWeights]);
  const pooledDM_calc = useMemo(() => computePooledICC(iccDM, siteWeights), [iccDM, siteWeights]);

  const effectiveICCHTN = iccSource === "manual" ? manualICCHTN : (pooledHTN ?? pooledBP);
  const effectiveICCDM = iccSource === "manual" ? manualICCDM : (pooledDM_calc ?? pooledGlyc);

  // Compute results
  const htnResult = useMemo(() =>
    sampleSizePerArm(htn_p_control, pInt(htn_p_control, htn_effect), alpha, power, htn_clusterSize, effectiveICCHTN, cv, attrition, stratified ? stratR2 : 0),
    [htn_p_control, htn_effect, alpha, power, htn_clusterSize, effectiveICCHTN, cv, attrition, stratified, stratR2]
  );

  const dmResult = useMemo(() =>
    sampleSizePerArm(dm_p_control, pInt(dm_p_control, dm_effect), alpha, power, dm_clusterSize, effectiveICCDM, cv, attrition, stratified ? stratR2 : 0),
    [dm_p_control, dm_effect, alpha, power, dm_clusterSize, effectiveICCDM, cv, attrition, stratified, stratR2]
  );

  const htnTotalClusters = htnResult.clusters * 2 * (poweringLevel === "site" ? NUM_SITES : 1);
  const dmTotalClusters = dmResult.clusters * 2 * (poweringLevel === "site" ? NUM_SITES : 1);
  const htnBinding = htnTotalClusters >= dmTotalClusters;

  // Sensitivity: ICC
  const sensitivityICC = useMemo(() => {
    const data = [];
    const mult = poweringLevel === "site" ? NUM_SITES : 1;
    for (let icc = 0.01; icc <= 0.15; icc += 0.005) {
      const h = sampleSizePerArm(htn_p_control, pInt(htn_p_control, htn_effect), alpha, power, htn_clusterSize, icc, cv, attrition, stratified ? stratR2 : 0);
      const d = sampleSizePerArm(dm_p_control, pInt(dm_p_control, dm_effect), alpha, power, dm_clusterSize, icc, cv, attrition, stratified ? stratR2 : 0);
      data.push({ icc: icc.toFixed(3), HTN_Clusters: h.clusters * 2 * mult, DM_Clusters: d.clusters * 2 * mult });
    }
    return data;
  }, [htn_p_control, htn_effect, dm_p_control, dm_effect, alpha, power, htn_clusterSize, dm_clusterSize, cv, attrition, stratified, stratR2, poweringLevel]);

  // Sensitivity: cluster size
  const sensitivityCluster = useMemo(() => {
    const data = [];
    const mult = poweringLevel === "site" ? NUM_SITES : 1;
    for (let m = 5; m <= 50; m += 5) {
      const h = sampleSizePerArm(htn_p_control, pInt(htn_p_control, htn_effect), alpha, power, m, effectiveICCHTN, cv, attrition, stratified ? stratR2 : 0);
      const d = sampleSizePerArm(dm_p_control, pInt(dm_p_control, dm_effect), alpha, power, m, effectiveICCDM, cv, attrition, stratified ? stratR2 : 0);
      data.push({ cluster_size: m, HTN_Clusters: h.clusters * 2 * mult, HTN_Participants: h.total_per_arm * 2 * mult, DM_Clusters: d.clusters * 2 * mult, DM_Participants: d.total_per_arm * 2 * mult });
    }
    return data;
  }, [htn_p_control, htn_effect, dm_p_control, dm_effect, alpha, power, effectiveICCHTN, effectiveICCDM, cv, attrition, stratified, stratR2, poweringLevel]);

  // MDE data
  const mdeData = useMemo(() => {
    const data = [];
    for (let c = 10; c <= 60; c += 5) {
      let lo = 0.01, hi = 0.30, eff = 0;
      for (let iter = 0; iter < 50; iter++) {
        eff = (lo + hi) / 2;
        const r = sampleSizePerArm(htn_p_control, htn_p_control + eff, alpha, power, htn_clusterSize, effectiveICCHTN, cv, attrition, stratified ? stratR2 : 0);
        const needed = poweringLevel === "site" ? r.clusters : Math.ceil(r.clusters / NUM_SITES);
        if (needed > c) lo = eff; else hi = eff;
      }
      let lo2 = 0.01, hi2 = 0.30, eff2 = 0;
      for (let iter = 0; iter < 50; iter++) {
        eff2 = (lo2 + hi2) / 2;
        const r = sampleSizePerArm(dm_p_control, dm_p_control + eff2, alpha, power, dm_clusterSize, effectiveICCDM, cv, attrition, stratified ? stratR2 : 0);
        const needed = poweringLevel === "site" ? r.clusters : Math.ceil(r.clusters / NUM_SITES);
        if (needed > c) lo2 = eff2; else hi2 = eff2;
      }
      data.push({
        clusters_per_arm: c,
        HTN_MDE: parseFloat((eff * 100).toFixed(1)),
        DM_MDE: parseFloat((eff2 * 100).toFixed(1)),
      });
    }
    return data;
  }, [htn_p_control, dm_p_control, alpha, power, htn_clusterSize, dm_clusterSize, effectiveICCHTN, effectiveICCDM, cv, attrition, stratified, stratR2, poweringLevel]);

  // ── Per-site MDE: given each site's own baseline & ICC, what Δ can we detect at the planned budget? ──
  const perSiteMDE = useMemo(() => {
    const isSite = poweringLevel === "site";
    // clusters per arm per site from chosen powering level
    const htnCPAS = isSite ? htnResult.clusters : Math.ceil(htnResult.clusters / NUM_SITES);
    const dmCPAS  = isSite ? dmResult.clusters  : Math.ceil(dmResult.clusters  / NUM_SITES);
    // Binary search MDE for a given p_control, icc, m, budget (clusters per arm per site)
    const findMDE = (p_ctrl, icc, m, budget) => {
      let lo = 0.001, hi = Math.min(0.50, 1 - p_ctrl - 0.001), best = null;
      for (let iter = 0; iter < 60; iter++) {
        const eff = (lo + hi) / 2;
        const r = sampleSizePerArm(p_ctrl, p_ctrl + eff, alpha, power, m, icc, cv, attrition, stratified ? stratR2 : 0);
        if (r.clusters > budget) lo = eff; else { hi = eff; best = eff; }
      }
      return best;
    };
    return SURVEY_DATA.sites.map((s, i) => {
      const pBP   = s.bpCtrl !== null ? s.bpCtrl / 100 : null;
      const pGlyc = (s.glycCtrl !== null && !s.lowHba1c) ? s.glycCtrl / 100 : null;
      const iccBP   = parseFloat(iccHTN[i]);
      const iccGlyc = parseFloat(iccDM[i]);
      const mdeBP   = (pBP   !== null && !isNaN(iccBP))   ? findMDE(pBP,   iccBP,   htn_clusterSize, htnCPAS) : null;
      const mdeGlyc = (pGlyc !== null && !isNaN(iccGlyc)) ? findMDE(pGlyc, iccGlyc, dm_clusterSize,  dmCPAS)  : null;
      return {
        name: s.name, insufficient: s.insufficient, lowHba1c: s.lowHba1c,
        pBP, pGlyc, iccBP, iccGlyc,
        mdeBP:   mdeBP   !== null ? mdeBP * 100 : null,
        mdeGlyc: mdeGlyc !== null ? mdeGlyc * 100 : null,
        mdeBPrel:   (mdeBP   !== null && pBP   !== null) ? (mdeBP   / pBP)   : null, // relative fraction
        mdeGlycRel: (mdeGlyc !== null && pGlyc !== null) ? (mdeGlyc / pGlyc) : null,
        htnCPAS, dmCPAS,
      };
    });
  }, [htnResult, dmResult, iccHTN, iccDM, htn_clusterSize, dm_clusterSize, alpha, power, cv, attrition, stratified, stratR2, poweringLevel]);

  const updateICC = useCallback((arr, setter, idx, val) => {
    const next = [...arr];
    next[idx] = val;
    setter(next);
  }, []);

  // Export handler
  const handleExport = () => {
    const siteICCData = SITES.map((name, i) => ({
      name,
      n: SURVEY_DATA.sites[i].n,
      clusters: SURVEY_DATA.sites[i].clusters,
      iccBP: parseFloat(iccHTN[i]) || 0,
      iccGlyc: parseFloat(iccDM[i]) || 0,
      iccBPPooled: iccBPIsPooled[i],
      iccGlycPooled: iccGlycIsPooled[i],
      insufficient: SURVEY_DATA.sites[i].insufficient || false,
    }));

    const html = generateExportHTML({
      effectiveICCHTN, effectiveICCDM, htnResult, dmResult,
      htn_p_control, htn_effect, dm_p_control, dm_effect,
      htn_clusterSize, dm_clusterSize, alpha, power, attrition,
      cv, stratified, stratR2, poweringLevel, htnBinding, siteICCData,
      htn_p_int, dm_p_int,
    });

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `STEPS-INDIA_SampleSize_Summary_${new Date().toISOString().slice(0, 10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div style={styles.app}>
      {/* Header */}
      <div style={styles.header}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <h1 style={styles.headerTitle}>STEPS-INDIA CRCT Sample Size Calculator</h1>
            <p style={styles.headerSub}>
              Interactive tool for finalizing cluster count and sample size using baseline survey ICCs
              &nbsp;|&nbsp; Co-primary outcomes (BP &amp; Glycemic Control) &nbsp;|&nbsp; v2.2
            </p>
          </div>
          <button style={styles.exportBtn} onClick={handleExport}>
            Export Summary
          </button>
        </div>
      </div>

      <div style={styles.container}>
        {/* Survey Data Banner */}
        <div style={styles.surveyBanner}>
          <div style={{ fontSize: "20px" }}>&#128202;</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: "13px", fontWeight: "700", color: GREEN }}>
              Pre-populated from Baseline Survey ({SURVEY_DATA.date})
            </div>
            <div style={{ fontSize: "11.5px", color: "#555" }}>
              {SURVEY_DATA.totalN.toLocaleString()} participants | {SURVEY_DATA.totalClusters} clusters | 6 sites |
              ICCs via GEE (exchangeable correlation) |
              Sites with ICC=0 or insufficient data use pooled overall estimate
              <br /><span style={{ color: ORANGE }}>Note: HbA1c verified for 543/729 DM patients (74.5%) — glycemic ICCs at some sites may be unreliable</span>
            </div>
          </div>
          <div style={{ textAlign: "right", fontSize: "11px", color: "#777" }}>
            <div>Overall BP Ctrl: <strong>{SURVEY_DATA.overall.bpCtrl}%</strong></div>
            <div>Overall Glyc Ctrl: <strong>{SURVEY_DATA.overall.glycCtrl}%</strong></div>
          </div>
        </div>

        {/* ── Panel 1: ICC Input ── */}
        <div style={styles.sectionTitle}>1. Intraclass Correlation Coefficients (ICCs)</div>
        <div style={styles.grid2}>
          <Card title="Site-wise ICCs from Baseline Survey (GEE)">
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={styles.th}>Site</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>N</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>ICC (BP Ctrl)</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>HbA1c Valid</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>ICC (Glycemic)</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>Wt</th>
                </tr>
              </thead>
              <tbody>
                {SITES.map((site, i) => {
                  const sd = SURVEY_DATA.sites[i];
                  const isInsuff = sd.insufficient;
                  return (
                    <tr key={i} style={{ background: isInsuff ? "#FFF5F5" : (i % 2 === 0 ? "white" : "#F8FAFC") }}>
                      <td style={{ ...styles.td, fontSize: "11.5px", fontWeight: "500" }}>
                        {site}
                        {isInsuff && <span style={styles.badgeInsuff}>low N</span>}
                      </td>
                      <td style={{ ...styles.td, textAlign: "center", fontSize: "11px", color: "#888" }}>
                        {sd.n}
                      </td>
                      <td style={{ ...styles.td, textAlign: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "2px" }}>
                          <input style={{ ...styles.input, background: iccBPIsPooled[i] ? "#FFF8E7" : "white" }} type="number" step="0.001" min="0" max="1"
                            value={iccHTN[i]} onChange={e => updateICC(iccHTN, setIccHTN, i, e.target.value)} />
                          {iccBPIsPooled[i] && <span style={styles.badgePooled}>pooled</span>}
                          {!iccBPIsPooled[i] && <span style={styles.badgeSurvey}>survey</span>}
                        </div>
                      </td>
                      <td style={{ ...styles.td, textAlign: "center", fontSize: "10.5px" }}>
                        {sd.dmN > 0 ? (
                          <span style={{ color: sd.lowHba1c ? RED : (sd.dmHba1cValid === 0 ? "#999" : "#333") }}>
                            {sd.dmHba1cValid}/{sd.dmN}
                            {sd.dmN > 0 && <span style={{ color: "#888" }}> ({(sd.dmHba1cValid / sd.dmN * 100).toFixed(0)}%)</span>}
                            {sd.lowHba1c && <span style={styles.badgeLowHba1c}>gaps</span>}
                          </span>
                        ) : "—"}
                      </td>
                      <td style={{ ...styles.td, textAlign: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "2px" }}>
                          <input style={{ ...styles.input, background: sd.lowHba1c ? "#FFE0B2" : (iccGlycIsPooled[i] ? "#FFF8E7" : "white") }} type="number" step="0.001" min="0" max="1"
                            value={iccDM[i]} onChange={e => updateICC(iccDM, setIccDM, i, e.target.value)} />
                          {iccGlycIsPooled[i] && <span style={styles.badgePooled}>pooled</span>}
                          {!iccGlycIsPooled[i] && !sd.lowHba1c && <span style={styles.badgeSurvey}>survey</span>}
                          {sd.lowHba1c && <span style={styles.badgeLowHba1c}>unreliable</span>}
                        </div>
                      </td>
                      <td style={{ ...styles.td, textAlign: "center" }}>
                        <input style={{ ...styles.input, width: "50px" }} type="number" step="1" min="1"
                          value={siteWeights[i]} onChange={e => { const w = [...siteWeights]; w[i] = parseInt(e.target.value) || 1; setSiteWeights(w); }} />
                      </td>
                    </tr>
                  );
                })}
                <tr style={{ background: "#E8EDF3", fontWeight: "700" }}>
                  <td style={{ ...styles.td, fontWeight: "700" }} colSpan={2}>Weighted Pooled</td>
                  <td style={{ ...styles.td, textAlign: "center", color: ACCENT, fontWeight: "700" }}>{pooledHTN !== null ? pooledHTN.toFixed(4) : "—"}</td>
                  <td style={{ ...styles.td, textAlign: "center", fontSize: "10.5px", color: "#666" }}>543/729 (74.5%)</td>
                  <td style={{ ...styles.td, textAlign: "center", color: GREEN, fontWeight: "700" }}>{pooledDM_calc !== null ? pooledDM_calc.toFixed(4) : "—"}</td>
                  <td style={styles.td}></td>
                </tr>
              </tbody>
            </table>
            <div style={styles.note}>
              <strong>Legend:</strong> <span style={styles.badgeSurvey}>survey</span> = site-specific GEE estimate |
              <span style={styles.badgePooled}>pooled</span> = overall pooled ICC (site had ICC=0 or insufficient data) |
              <span style={styles.badgeInsuff}>low N</span> = &lt;200 participants |
              <span style={styles.badgeLowHba1c}>gaps</span> / <span style={styles.badgeLowHba1c}>unreliable</span> = incomplete HbA1c verification.
              <br />Weights default to cluster count; editable. Per Giraudeau (2006), ICCs from pre-randomization data.
            </div>
            <div style={{ ...styles.note, background: "#FFF0F0", borderLeftColor: RED, marginTop: "8px" }}>
              <strong style={{ color: RED }}>HbA1c Data Quality Warning:</strong> {SURVEY_DATA.hba1cNote}
              <br />Glycemic ICCs at sites with &lt;80% HbA1c availability may be inflated due to sparse within-cluster data.
              Sites with complete data (Jammu 100%, Madurai 100%) show much lower glycemic ICCs (0.02, 0.00).
            </div>
          </Card>

          <Card title="ICC Source for Calculation">
            <div style={{ marginBottom: "16px" }}>
              <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
                <button style={{ ...styles.toggleBtn, ...(iccSource === "survey" ? styles.toggleActive : {}) }} onClick={() => setIccSource("survey")}>
                  Survey Pooled (recommended)
                </button>
                <button style={{ ...styles.toggleBtn, ...(iccSource === "manual" ? styles.toggleActive : {}) }} onClick={() => setIccSource("manual")}>
                  Manual Override
                </button>
              </div>

              {iccSource === "manual" ? (
                <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
                  <ParamInput label="ICC - BP Control" value={manualICCHTN} onChange={setManualICCHTN} step="0.005" min={0} max={0.5} />
                  <ParamInput label="ICC - Glycemic Control" value={manualICCDM} onChange={setManualICCDM} step="0.005" min={0} max={0.5} />
                </div>
              ) : (
                <div style={{ padding: "10px", background: "#E8F5E9", borderRadius: "6px", fontSize: "12.5px" }}>
                  Using weighted pooled ICCs from site table above:<br />
                  <strong>HTN = {effectiveICCHTN.toFixed(4)}</strong> | <strong>DM = {effectiveICCDM.toFixed(4)}</strong>
                </div>
              )}
            </div>

            <tbody>
              {perSiteMDE.map((row, i) => {
                const bpOK   = row.mdeBPrel   !== null && row.mdeBPrel   <= htn_effect;
                const glycOK = row.mdeGlycRel !== null && row.mdeGlycRel <= dm_effect;
                return (
                  <tr key={i} style={{ background: i % 2 === 0 ? "white" : "#F8FAFC" }}>
                    <td style={{ ...styles.td, fontWeight: "500", fontSize: "11.5px" }}>{row.name}</td>
                    <td style={{ ...styles.td, textAlign: "center" }}>{row.pBP !== null ? (row.pBP * 100).toFixed(1) + "%" : "—"}</td>
                    <td style={{ ...styles.td, textAlign: "center", fontSize: "11px" }}>{!isNaN(row.iccBP) ? row.iccBP.toFixed(4) : "—"}</td>
                    <td style={{ ...styles.td, textAlign: "center", fontWeight: "700", color: ACCENT }}>
                      {row.mdeBPrel !== null ? `${(row.mdeBPrel * 100).toFixed(0)}% (${row.mdeBP.toFixed(1)}pp)` : "—"}
                    </td>
                    <td style={{ ...styles.td, textAlign: "center" }}>
                      {row.mdeBPrel !== null ? (
                        <span style={{ ...styles.badge, background: bpOK ? GREEN : ORANGE, color: "white", marginLeft: 0 }}>
                          {bpOK ? "powered" : "under-powered"}
                        </span>
                      ) : "—"}
                    </td>
                    <td style={{ ...styles.td, textAlign: "center" }}>
                      {row.pGlyc !== null ? (row.pGlyc * 100).toFixed(1) + "%" : <span style={{ color: RED, fontSize: "10.5px" }}>HbA1c gap</span>}
                    </td>
                    <td style={{ ...styles.td, textAlign: "center", fontSize: "11px" }}>{!isNaN(row.iccGlyc) ? row.iccGlyc.toFixed(4) : "—"}</td>
                    <td style={{ ...styles.td, textAlign: "center", fontWeight: "700", color: GREEN }}>
                      {row.mdeGlycRel !== null ? `${(row.mdeGlycRel * 100).toFixed(0)}% (${row.mdeGlyc.toFixed(1)}pp)` : "—"}
                    </td>
                    <td style={{ ...styles.td, textAlign: "center" }}>
                      {row.mdeGlycRel !== null ? (
                        <span style={{ ...styles.badge, background: glycOK ? GREEN : ORANGE, color: "white", marginLeft: 0 }}>
                          {glycOK ? "powered" : "under-powered"}
                        </span>
                      ) : "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={styles.note}>
            <strong>Interpretation:</strong> "powered" means the site's site-specific analysis (alone) could detect the planned effect at its own baseline.
            "under-powered" means the site can only detect larger effects than planned — pooled analysis is appropriate but site-alone effectiveness claims would be weak.
            Baseline control rates near 50% (variance-maximum) make detection hardest; extreme baselines (Delhi BP 8.5%) are easier.
            Sites with HbA1c verification gaps show "—" for glycemic MDE until data is complete.
          </div>
        </Card>

        {/* ── Formula Reference ── */}
        <div style={styles.sectionTitle}>5. Formula Reference</div>
        <Card title="Methodology &amp; Formulas">
          <div style={{ fontSize: "12.5px", lineHeight: "1.8", color: "#333" }}>
            <p><strong>Individual-level sample size</strong> (comparison of two proportions):</p>
            <div style={{ background: "#F5F5F5", padding: "10px 14px", borderRadius: "4px", fontFamily: "monospace", fontSize: "12px", margin: "6px 0 12px" }}>
              n = (z_alpha/2 + z_beta)^2 x [p1(1-p1) + p2(1-p2)] / (p1 - p2)^2
            </div>

            <p><strong>Design effect</strong> (Donner &amp; Klar):</p>
            <div style={{ background: "#F5F5F5", padding: "10px 14px", borderRadius: "4px", fontFamily: "monospace", fontSize: "12px", margin: "6px 0 12px" }}>
              DE = 1 + (m - 1) x rho
            </div>

            <p><strong>Adjusted DE for varying cluster sizes</strong> (Eldridge et al. 2006):</p>
            <div style={{ background: "#F5F5F5", padding: "10px 14px", borderRadius: "4px", fontFamily: "monospace", fontSize: "12px", margin: "6px 0 12px" }}>
              DE_adj = 1 + [(CV^2 + 1) x m - 1] x rho
            </div>

            <p><strong>Stratification adjustment</strong>:</p>
            <div style={{ background: "#F5F5F5", padding: "10px 14px", borderRadius: "4px", fontFamily: "monospace", fontSize: "12px", margin: "6px 0 12px" }}>
              rho_eff = rho x (1 - R^2), where R^2 = variance explained by strata
            </div>

            <p><strong>ICC estimation (from survey):</strong></p>
            <div style={{ background: "#F5F5F5", padding: "10px 14px", borderRadius: "4px", fontFamily: "monospace", fontSize: "12px", margin: "6px 0 12px" }}>
              GEE with exchangeable correlation structure (Zou &amp; Donner 2004)<br />
              Sites with ICC=0 or N&lt;200: replaced with overall pooled estimate
            </div>

            <p style={{ fontSize: "11px", color: "#777", marginTop: "12px" }}>
              <strong>References:</strong> Donner &amp; Klar (1981); Hayes &amp; Bennett (1999); Eldridge, Ashby &amp; Kerry (2006);
              Rutterford, Copas &amp; Eldridge (2015); van Breukelen &amp; Candel (2012); Zou &amp; Donner (2004).
              <br />Co-primary outcome alpha-adjustment per Bonferroni; CONSORT-CRT extension (Campbell et al. 2012).
            </p>
          </div>
        </Card>

        <div style={{ textAlign: "center", padding: "20px 0", fontSize: "11px", color: "#999" }}>
          STEPS-INDIA CRCT Sample Size Calculator v2.2 &nbsp;|&nbsp; Baseline survey data: {SURVEY_DATA.date}
          &nbsp;|&nbsp; Investigators' Meeting, Jammu, April 2026 &nbsp;|&nbsp; ICMR-NHRP Funded
        </div>
      </div>
    </div>
  );
}

// Initialize and render the application
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
</body>
